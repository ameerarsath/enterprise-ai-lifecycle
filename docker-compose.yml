version: '3.8'

services:
  db:
    # [43] pgvector for semantic memory and vector store
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_dev_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ai_dev_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    # [42] Redis AOF (Append Only File) to prevent data loss on crash
    command: redis-server --appendonly yes --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
